services:
  - type: web
    name: studentenjobs-sachsen-backend
    env: python
    region: frankfurt   # closest to Saxony
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: ADZUNA_APP_ID
        sync: false        # set manually in Render dashboard
      - key: ADZUNA_APP_KEY
        sync: false
      - key: JSEARCH_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
